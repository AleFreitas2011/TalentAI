{% extends "base.html" %} {% block content %}

<div style="max-width:900px; margin:auto;">

    <!-- 🚀 HEADER -->
    <h1 style="
        font-size:28px;
        font-weight:bold;
        background: linear-gradient(90deg, #2563eb, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    ">
        📤 Envio para Cliente
    </h1>

    <p style="color:#6b7280;">
        Revise o email antes de enviar
    </p>

    <br>

    <!-- 💼 INFO -->
    <div style="
        background:#ffffff;
        padding:20px;
        border-radius:12px;
        box-shadow:0 5px 20px rgba(0,0,0,0.05);
        margin-bottom:20px;
    ">
        <b>Cliente:</b> {{ cliente.nome_contato }} <br>
        <b>Email:</b> {{ cliente.email }} <br>
        <b>Vaga:</b> {{ vaga.titulo }}
    </div>

    <!-- 📄 EMAIL -->
    <div style="
        background:#f9fafb;
        padding:20px;
        border-radius:12px;
        white-space: pre-wrap;
        line-height:1.6;
        color:#111827;
        box-shadow: inset 0 0 0 1px #e5e7eb;
    ">
        {{ email }}
    </div>

    <br>

    <!-- 🚀 BOTÕES -->
    <div style="display:flex; gap:10px; flex-wrap:wrap;">

        <!-- 📤 ENVIAR -->
        <a href="mailto:{{ cliente.email }}?subject=Shortlist - {{ vaga.titulo }}&body={{ email | urlencode }}" style="
                background:linear-gradient(90deg,#2563eb,#7c3aed);
                color:white;
                padding:12px 22px;
                border-radius:10px;
                text-decoration:none;
                font-weight:bold;
                box-shadow:0 4px 10px rgba(0,0,0,0.1);
           ">
           🚀 Enviar Email
        </a>

        <!-- 📋 COPIAR -->
        <button onclick="copiarEmail()" style="
            background:#10b981;
            color:white;
            padding:12px 22px;
            border:none;
            border-radius:10px;
            font-weight:bold;
            cursor:pointer;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        ">
            📋 Copiar Email
        </button>

        <!-- 🔙 VOLTAR -->
        <a href="/vaga/{{ vaga.id }}" style="
            background:#e5e7eb;
            color:#374151;
            padding:12px 22px;
            border-radius:10px;
            text-decoration:none;
            font-weight:bold;
        ">
            ← Voltar
        </a>

    </div>

</div>

<script>
    function copiarEmail() {
        const texto = `{{ email | escape }}`;
        navigator.clipboard.writeText(texto);
        alert("Email copiado com sucesso 🚀");
    }
</script>

{% endblock %}
