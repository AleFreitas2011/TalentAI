<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login - TalentAI</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        button:hover {
            background: #1e40af;
        }
        
        .link {
            text-align: center;
            margin-top: 10px;
        }
        
        .link a {
            text-decoration: none;
            color: #2563eb;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Login</h2>

        <form method="post" action="/login">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="senha" placeholder="Senha" required>

            <button type="submit">Entrar</button>
        </form>

        {% if erro %}
        <p style="color:red; text-align:center;">{{ erro }}</p>
        {% endif %}

        <div class="link">
            <p>Não tem conta? <a href="/register">Criar conta</a></p>
        </div>
    </div>

</body>

</html>
